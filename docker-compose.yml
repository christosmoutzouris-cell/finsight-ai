services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  # Το Kafka χρειάζεται Zookeeper για να συντονίζει τα brokers του.
  # Σκέψου το σαν "διευθυντή" που ξέρει πού είναι τα πάντα.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finsight-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      retries: 5

  # ── Kafka Broker ───────────────────────────────────────────────────────────
  # Το message bus. Ο producer στέλνει εδώ, ο consumer διαβάζει από εδώ.
  # Τα μηνύματα αποθηκεύονται σε "topics" — σαν κανάλια.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    platform: linux/amd64
    container_name: finsight-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST: για πρόσβαση από το host (WSL2)
      # PLAINTEXT: για επικοινωνία μεταξύ containers
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 15s
      retries: 8

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  # Web UI για να βλέπεις live τα messages που ρέουν στο Kafka.
  # Άνοιξε http://localhost:8080 μετά το docker compose up.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finsight-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finsight
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Η βάση δεδομένων. Ο consumer γράφει εδώ κάθε τιμή που διαβάζει από Kafka.
  postgres:
    image: postgres:16
    container_name: finsight-postgres
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data     # persistent storage
      - ./init-db:/docker-entrypoint-initdb.d      # τρέχει το init.sql αυτόματα
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      retries: 5

  # ── Producer ───────────────────────────────────────────────────────────────
  # Python service: κάθε N δευτερόλεπτα τραβάει τιμές μετοχών
  # και τις στέλνει στο Kafka topic ως JSON messages.
  producer:
    build: ./producer
    container_name: finsight-producer
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Consumer ───────────────────────────────────────────────────────────────
  # Python service: ακούει το Kafka topic και γράφει κάθε message
  # στη PostgreSQL αμέσως μόλις το λάβει.
  consumer:
    build: ./consumer
    container_name: finsight-consumer
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Airflow Database ───────────────────────────────────────────────────────
  # Ξεχωριστή PostgreSQL για τα metadata του Airflow (DAG runs, task states κλπ)
  # ΔΕΝ είναι η ίδια με τη finsight-postgres
  airflow-db:
    image: postgres:16
    container_name: finsight-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
      POSTGRES_DB: airflow_db
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U airflow -d airflow_db
      interval: 10s
      retries: 5

  # ── Airflow Init ───────────────────────────────────────────────────────────
  # Τρέχει μια φορά: δημιουργεί τον admin user και τις tables στη βάση
  # Μετά τερματίζει (exit 0) — αυτό είναι φυσιολογικό
  airflow-init:
    container_name: finsight-airflow-init
    build: ./airflow
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-db/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: >
      bash -c "
        airflow db migrate && airflow users create --username admin --password admin123 --firstname Admin --lastname User --role Admin --email admin@finsight.com "
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  # Το web UI του Airflow — άνοιξε http://localhost:8081
  # Login: admin / admin123
  airflow-webserver:
    build: ./airflow
    container_name: finsight-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-db/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "finsight-secret-key-2026"
    volumes:
      - ./dags:/opt/airflow/dags        # τα DAG files μας
      - ./spark_jobs:/opt/spark_jobs
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    restart: unless-stopped

  # ── Airflow Scheduler ──────────────────────────────────────────────────────
  # Ο "εγκέφαλος" — αποφασίζει πότε να τρέξει κάθε DAG
  # Χωρίς scheduler, τα DAGs δεν τρέχουν ποτέ
  airflow-scheduler:
    build: ./airflow
    container_name: finsight-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-db/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "finsight-secret-key-2026"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark_jobs:/opt/spark_jobs
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    restart: unless-stopped

# ── Spark Master ───────────────────────────────────────────────────────────
  # Ο "διευθυντής" του Spark cluster — κατανέμει εργασίες στους workers
  # UI: http://localhost:8082
  spark-master:
    image: apache/spark:3.5.3
    container_name: finsight-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8082:8080"
      - "7077:7077"
    volumes:
      - ./spark_jobs:/opt/spark_jobs

  # ── Spark Worker ───────────────────────────────────────────────────────────
  # Εκτελεί τις εργασίες που του αναθέτει ο master
  # Σε production έχεις πολλούς workers — εδώ έναν αρκεί
  spark-worker:
    image: apache/spark:3.5.3
    container_name: finsight-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes:
      - ./spark_jobs:/opt/spark_jobs

# ── dbt ───────────────────────────────────────────────────────────────────
  # Τρέχει dbt commands μέσα σε container
  # Δεν τρέχει συνεχώς — εκτελείται on-demand ή από Airflow
  dbt:
    image: python:3.11-slim
    container_name: finsight-dbt
    volumes:
      - ./dbt:/usr/app/dbt
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /usr/app/dbt
    ports:
      - "8083:8080" 
    command: >
      bash -c "pip install dbt-postgres==1.7.0 && tail -f /dev/null"

# ── Sentiment Analysis ────────────────────────────────────────────────
  sentiment:
    build: ./ai/sentiment
    container_name: finsight-sentiment
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - sentiment_model:/app/models 
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"    # Τρέχει μια φορά και σταματάει

  
  lstm:
   build: ./ai/lstm
   container_name: finsight-lstm
   environment:
     - PYTHONUNBUFFERED=1
   depends_on:
     postgres:
       condition: service_healthy
   restart: "no"

  neural-networks:
    build: ./ai/neural_networks
    container_name: finsight-neural-networks
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - nn_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Ollama ─────────────────────────────────────────────────────────────────
  # Τρέχει LLM τοπικά — σαν ChatGPT αλλά στον υπολογιστή σου
  # UI: http://localhost:11434
  ollama:
    image: ollama/ollama:latest
    container_name: finsight-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama    # αποθηκεύει τα models (δεν τα κατεβάζει κάθε φορά)
    restart: unless-stopped

  llm:
    build: ./ai/llm
    container_name: finsight-llm
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"


  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: finsight-api
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    
volumes:
  postgres_data:
  airflow_db_data:  
  airflow_logs: 
  sentiment_model:
  nn_models:   
  ollama_models:


